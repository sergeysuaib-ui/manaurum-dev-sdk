<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ManAurum Theme-Aware App</title>
  <script src="https://manaurum.com/sdk/manaurum.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { transition: all 0.2s; height: 100vh; display: flex; flex-direction: column; }

    /* Smoothie theme */
    body.smoothie {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f9f9ff; color: #181c23; font-size: 14px;
    }
    body.smoothie .header { padding: 20px 24px; border-bottom: 1px solid rgba(0,0,0,0.06); }
    body.smoothie .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
    body.smoothie .card {
      background: rgba(255,255,255,0.6); border-radius: 20px; padding: 16px 20px;
      border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    body.smoothie .btn {
      padding: 10px 20px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #0058bc, #0070eb); color: white;
      font-weight: 700; font-size: 14px; cursor: pointer;
    }
    body.smoothie .input {
      width: 100%; padding: 12px 16px; border-radius: 12px; border: none;
      background: #f1f3fe; font-size: 14px; outline: none; color: #181c23;
    }
    body.smoothie .label {
      font-size: 11px; font-weight: 700; color: #414755;
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
    }
    body.smoothie .badge {
      padding: 2px 8px; border-radius: 9999px; font-size: 10px; font-weight: 700;
    }
    body.smoothie .text-muted { color: #717786; font-size: 13px; }

    /* XP theme */
    body.xp {
      font-family: Tahoma, sans-serif;
      background: #ece9d8; color: #000; font-size: 12px;
    }
    body.xp .header { padding: 8px 12px; border-bottom: 1px solid #aaa; }
    body.xp .header h1 { font-size: 14px; font-weight: 700; }
    body.xp .card {
      background: #fff; border-radius: 3px; padding: 8px 10px; border: 1px solid #aca899;
    }
    body.xp .btn {
      padding: 4px 16px; border-radius: 3px; border: 1px solid #214a87;
      background: #316ac5; color: white; font-weight: 700; font-size: 11px; cursor: pointer;
    }
    body.xp .input {
      width: 100%; padding: 6px 8px; border-radius: 3px; border: 1px solid #7f9db9;
      background: #fff; font-size: 12px; outline: none; color: #000;
    }
    body.xp .label { font-size: 11px; font-weight: 700; color: #333; margin-bottom: 4px; }
    body.xp .badge { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }
    body.xp .text-muted { color: #666; font-size: 11px; }

    /* Shared */
    .content { flex: 1; overflow-y: auto; padding: 24px; }
    body.xp .content { padding: 12px; }
    .badge-success { background: #dcfce7; color: #16a34a; }
    .badge-error { background: #fef2f2; color: #dc2626; }
    .badge-info { background: #dbeafe; color: #2563eb; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
  </style>
</head>
<body class="smoothie">
  <div class="header">
    <h1 id="title">Loading...</h1>
    <p class="text-muted" id="subtitle"></p>
  </div>

  <div class="content">
    <div class="card" style="margin-bottom: 16px;">
      <div class="label">Example Card</div>
      <p>This card adapts to both Smoothie and XP themes automatically.</p>
      <div style="margin-top: 12px; display: flex; gap: 6px;">
        <span class="badge badge-success">Active</span>
        <span class="badge badge-info">v1.0</span>
      </div>
    </div>

    <div style="margin-bottom: 16px;">
      <div class="label">Input Example</div>
      <input class="input" placeholder="Type something..." id="demo-input">
    </div>

    <button class="btn" id="toast-btn">
      <span class="material-symbols-outlined" style="font-size: 18px; margin-right: 6px;">notifications</span>
      Show Toast
    </button>
  </div>

  <script>
    var sdk = ManaurumSDK.init();

    sdk.onReady(function(ctx) {
      document.body.className = ctx.theme;
      document.getElementById('title').textContent = 'Hello, ' + ctx.user.nickname + '!';
      document.getElementById('subtitle').textContent = 'Theme: ' + ctx.theme;
    });

    sdk.onThemeChange(function(theme) {
      document.body.className = theme;
      document.getElementById('subtitle').textContent = 'Theme: ' + theme;
    });

    document.getElementById('toast-btn').onclick = function() {
      sdk.toastSuccess('It works!');
    };
  </script>
</body>
</html>
